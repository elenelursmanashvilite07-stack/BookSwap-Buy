{% extends "base.html" %}

{% block content %}

<div class="row">

    <div class="col-md-4">

        {% if book.image %}

        <img src="{{ url_for('static', filename='uploads/' + book.image) }}"
             class="img-fluid rounded shadow">

        {% endif %}

    </div>

    <div class="col-md-8">

        <h2>{{ book.title }}</h2>

        <hr>

        <p><strong>✍️ ავტორი:</strong> {{ book.author }}</p>

        <p><strong>📚 ჟანრი:</strong> {{ book.genre }}</p>

        <p><strong>⭐ მდგომარეობა:</strong> {{ book.condition }}</p>

        <p><strong>💰 ფასი:</strong> {{ book.price }} ₾</p>

        <p><strong>აღწერა:</strong></p>

        <p>{{ book.description }}</p>

        <a href="/buy/{{ book.id }}"
           class="btn btn-success btn-lg">
            🛒 ყიდვა
        </a>

    </div>

</div>

{% endblock %}
